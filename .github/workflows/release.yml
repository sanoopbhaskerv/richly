name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Least privilege by default; the publish job elevates only what it needs.
permissions:
  contents: read

jobs:
  # A release tag must point at reviewed history — refuse tags on side branches.
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points at a commit that is not on main."
            exit 1
          fi

  browser:
    needs: guard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn playwright install --with-deps ${{ matrix.browser }}
      - run: yarn e2e --project=${{ matrix.browser }}

  publish:
    needs: browser
    runs-on: ubuntu-latest
    environment: npm # requires maintainer approval + holds NPM_TOKEN
    permissions:
      contents: write # gh release create
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
          registry-url: https://registry.npmjs.org
      - run: yarn install --frozen-lockfile
      - run: yarn release:check
      - name: Publish core
        run: npm publish ./packages/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish React bindings
        run: npm publish ./packages/react --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes --title "Richly $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
