<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Richly — demo (vanilla + React)</title>
    <style>
      body {
        margin: 0;
        padding: 32px 16px;
        background: #f4f5f7;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
        color: #1f2733;
      }
      [data-theme='dark'] body,
      html[data-theme='dark'] {
        background: #17191d;
        color: #e6e9ee;
      }
      .wrap {
        width: 100%;
        max-width: 1320px;
        margin: 0 auto;
        display: grid;
        gap: 28px;
      }
      .wrap > * {
        min-width: 0;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      @media (min-width: 900px) {
        .wrap {
          grid-template-columns: 1fr 1fr;
        }
        .head,
        .full-span {
          grid-column: span 2;
        }
      }
      h1 {
        font-size: 17px;
        margin: 0;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px;
        opacity: 0.75;
      }
      .theme-btn {
        border: 1px solid #d0d4da;
        background: #fff;
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h1>Richly demo — same core, two integrations</h1>
        <button
          class="theme-btn"
          data-testid="theme-toggle"
          onclick="
            document.documentElement.dataset.theme =
              document.documentElement.dataset.theme === 'dark' ? '' : 'dark'
          "
        >
          ◐ Theme
        </button>
      </div>
      <section class="full-span">
        <h2>Vanilla JS (with custom plugins)</h2>
        <div id="vanilla-host"></div>
      </section>
      <section>
        <h2>Vanilla JS (standard)</h2>
        <div id="vanilla-clean-host"></div>
      </section>
      <section class="full-span">
        <h2>React (with custom plugins)</h2>
        <div id="react-host"></div>
      </section>
      <section>
        <h2>React (standard)</h2>
        <div id="react-clean-host"></div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
