<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SB Editor — demo (vanilla + React)</title>
  <style>
    body {
      margin: 0;
      padding: 32px 16px;
      background: #f4f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      color: #1f2733;
    }
    [data-theme="dark"] body, html[data-theme="dark"] { background: #17191d; color: #e6e9ee; }
    .wrap { max-width: 860px; margin: 0 auto; display: grid; gap: 28px; }
    .head { display: flex; justify-content: space-between; align-items: baseline; }
    h1 { font-size: 17px; margin: 0; }
    h2 { font-size: 14px; font-weight: 600; margin: 0 0 8px; opacity: .75; }
    .theme-btn { border: 1px solid #d0d4da; background: #fff; border-radius: 8px; padding: 6px 12px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>SB Editor demo — same core, two integrations</h1>
      <button class="theme-btn" data-testid="theme-toggle" onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? '' : 'dark'">◐ Theme</button>
    </div>
    <section>
      <h2>Vanilla JS</h2>
      <div id="vanilla-host"></div>
    </section>
    <section>
      <h2>React</h2>
      <div id="react-host"></div>
    </section>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
